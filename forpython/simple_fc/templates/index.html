<html>
    <body>
        {%if show_question%}
        <h3>What is english for</h3>
        <h1>{{question}} ?</h1>
        <form method="post" action="/">
                <input type="submit" value="show_other_side" name="Show Other Side"/>
        </form>
        {%else%}
        <h3>True answer is</h3>
        <h1>{{answer}}</h1>
        <h3>Was your answer correct?</h3>
        <form method="post" action="/">
                <input type="submit" value="correct" name="I was right"/>
                <input type="submit" value="wrong" name="I was wrong"/>
        </form>
        {%endif%}
        <h4>score: {{score}}</h4>
    </body>
</html>
